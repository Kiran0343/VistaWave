<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="Vista Wave Consulting logo">
  <defs>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1FB5A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B5F7F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7FA1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004E6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16ABC2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A4A6C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Wave graphic: stylized "W" with flowing curves -->
  <!-- Left wave -->
  <path d="M 50 140 Q 80 80 120 140 Q 100 180 70 160" fill="url(#waveGrad1)" stroke="none"/>
  <path d="M 70 140 Q 95 95 130 150 Q 110 190 85 170" fill="url(#waveGrad2)" stroke="none" opacity="0.85"/>
  
  <!-- Middle wave -->
  <path d="M 120 140 Q 150 70 190 140 Q 170 190 140 160" fill="url(#waveGrad1)" stroke="none"/>
  <path d="M 140 140 Q 165 85 210 150 Q 185 200 160 170" fill="url(#waveGrad2)" stroke="none" opacity="0.85"/>
  
  <!-- Right wave -->
  <path d="M 190 140 Q 220 80 260 140 Q 240 180 210 160" fill="url(#waveGrad3)" stroke="none"/>
  <path d="M 210 140 Q 235 95 270 150 Q 250 190 225 170" fill="url(#waveGrad2)" stroke="none" opacity="0.85"/>

  <!-- Main text: VISTA WAVE -->
  <text x="320" y="140" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="800" fill="#00324D" letter-spacing="3">
    VISTA WAVE
  </text>

  <!-- Subtext: CONSULTING -->
  <text x="320" y="210" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="600" fill="#00324D" letter-spacing="2">
    CONSULTING
  </text>
</svg>
